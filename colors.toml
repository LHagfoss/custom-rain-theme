# Cozy Rain Theme Color Palette
# A smoky charcoal, light cream, and coral theme designed for Mewline, Neovim, Kitty, and Cava.

[colors]
base-bg = "#1A1D20"         # Smoky Charcoal base/background
panel-bg = "rgba(26, 29, 32, 0.85)" # Translucent background for panels and overlays
text-main = "#F0E5DE"       # Soft light cream main text
accent-coral = "#EC6E5D"    # Vibrant Coral for active modules, selections, and highlights
accent-slate = "#3C5865"    # Deep Slate Blue for scrollbars, visualizers, borders, and scales

[metadata]
name = "Cozy Rain"
author = "Lucas"
version = "1.0.0"
description = "Custom desktop aesthetic with a warm neutral cream text on smoky charcoal background, highlighted with deep slate and vibrant coral accents."
